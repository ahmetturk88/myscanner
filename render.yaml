# ================================================================
# render.yaml - MyScanner Full Deployment Configuration
# ================================================================

services:
  # ================================================================
  # 1. خدمة الويب الرئيسية (Flask Application)
  # ================================================================
  - type: web
    name: myscanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        value: your-secret-key-here-change-it
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: VIRUSTOTAL_API_KEY
        value: your-virustotal-api-key
      - key: ABSTRACT_API_KEY
        value: your-abstract-api-key
      - key: ABUSEIPDB_API_KEY
        value: your-abuseipdb-api-key
      - key: RESEND_API_KEY
        value: your-resend-api-key
      - key: MAIL_USERNAME
        value: your-email@gmail.com
      - key: MAIL_PASSWORD
        value: your-app-password
      - key: DATABASE_URL
        fromDatabase:
          name: myscanner-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: redis
          property: connectionString
      # ========================================================
      # ZAP و OpenVAS إعدادات
      # ========================================================
      - key: ZAP_API_KEY
        sync: false
      - key: ZAP_HOST
        value: localhost
      - key: ZAP_PORT
        value: 8080
      - key: MOCK_MODE
        value: false
      - key: OPENVAS_USERNAME
        sync: false
      - key: OPENVAS_PASSWORD
        sync: false
      - key: OPENVAS_HOST
        value: localhost
      - key: OPENVAS_PORT
        value: 9392

  # ================================================================
  # 2. خدمة Celery Worker
  # ================================================================
  - type: worker
    name: celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A tasks worker --loglevel=info --pool=solo
    envVars:
      - key: REDIS_URL
        fromService:
          name: redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: myscanner-db
          property: connectionString
      - key: SECRET_KEY
        value: your-secret-key-here-change-it
      - key: VIRUSTOTAL_API_KEY
        value: your-virustotal-api-key
      - key: ABSTRACT_API_KEY
        value: your-abstract-api-key
      - key: ABUSEIPDB_API_KEY
        value: your-abuseipdb-api-key
      - key: PYTHON_VERSION
        value: 3.11.0

  # ================================================================
  # 3. خدمة Celery Beat
  # ================================================================
  - type: worker
    name: celery-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A tasks beat --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: myscanner-db
          property: connectionString
      - key: SECRET_KEY
        value: your-secret-key-here-change-it

  # ================================================================
  # 4. خدمة Flower
  # ================================================================
  - type: web
    name: flower
    runtime: python
    buildCommand: pip install flower
    startCommand: flower --broker=$REDIS_URL --port=5555
    envVars:
      - key: REDIS_URL
        fromService:
          name: redis
          type: redis
          property: connectionString
      - key: FLOWER_BASIC_AUTH
        value: admin:password

  # ================================================================
  # 5. خدمة Redis
  # ================================================================
  - type: redis
    name: redis
    plan: free
    ipAllowList: []

  # ================================================================
  # 6. خدمة PostgreSQL
  # ================================================================
  - type: postgresql
    name: myscanner-db
    plan: free
    postgresqlMajorVersion: 15
    ipAllowList: []